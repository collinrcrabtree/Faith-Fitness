<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Faith & Form</title>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: "Times New Roman", Times, serif;
  color: #2b2b2b;
  background-color: #f5f3f0;
  line-height: 1.7;
}

/* Navigation */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: #fafafa;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav h1 { font-size: 22px; }

nav ul {
  list-style: none;
  display: flex;
  gap: 25px;
}

nav a {
  text-decoration: none;
  color: #2b2b2b;
  transition: 0.3s;
}

nav a:hover {
  color: #7a6650;
  transform: translateY(-2px);
}

/* Hero */
.hero {
  height: 50vh;
  background: url('https://via.placeholder.com/1600x600') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  color: #fff;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.35);
  transition: 0.4s;
}

.hero:hover::after { background: rgba(0,0,0,0.5); }

.hero:hover { transform: scale(1.02); transition: 0.6s; }

.hero-content {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-size: 40px;
  font-weight: 400;
}

.hero p {
  margin-top: 10px;
  font-size: 18px;
  color: #f5f3f0;
}

/* Container */
.container {
  max-width: 650px;
  margin: auto;
  padding: 60px 20px;
}

/* Card */
.form-card {
  background: #fffaf6;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.form-card:hover { transform: translateY(-5px); }

/* Inputs */
form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

input, textarea {
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  background: #fff;
  font-family: inherit;
  transition: 0.3s;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #7a6650;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}

/* Button */
.btn {
  padding: 14px;
  border: none;
  background: #7a6650;
  color: #f5f3f0;
  border-radius: 25px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.3s;
}

.btn:hover {
  background: #5f513e;
  transform: scale(1.05);
}

/* Loading state */
.btn.loading {
  opacity: 0.7;
  pointer-events: none;
}

/* Messages */
.message {
  margin-top: 15px;
  font-weight: 500;
  display: none;
}

.success { color: #7a6650; }
.error { color: #a94442; }

/* Footer */
footer {
  text-align: center;
  padding: 25px;
  background: #7a6650;
  color: #f5f3f0;
}

/* Responsive */
@media (max-width: 600px) {
  nav { flex-direction: column; gap: 10px; }
  .hero h1 { font-size: 28px; }
}
</style>
</head>
<body>

<nav>
  <h1>Faith & Form</h1>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="classes.html">Classes</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you. Let’s get you started.</p>
  </div>
</section>

<div class="container">

  <div class="form-card">

    <form id="contact-form">
      <input type="text" name="user_name" placeholder="Your Name" required>
      <input type="email" name="user_email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

      <button type="submit" class="btn" id="submit-btn">Send Message</button>
    </form>

    <p id="success-message" class="message success">✅ Message sent! We'll get back to you soon.</p>
    <p id="error-message" class="message error">❌ Something went wrong. Please try again.</p>

  </div>

</div>

<footer>
  <p>© 2026 Faith & Form Fitness Studio</p>
</footer>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY");
})();

const form = document.getElementById("contact-form");
const btn = document.getElementById("submit-btn");
const successMessage = document.getElementById("success-message");
const errorMessage = document.getElementById("error-message");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  btn.classList.add("loading");
  btn.innerText = "Sending...";

  emailjs.sendForm(
    "YOUR_SERVICE_ID",
    "YOUR_TEMPLATE_ID",
    this
  )
  .then(function() {
    form.reset();
    successMessage.style.display = "block";
    errorMessage.style.display = "none";

    btn.classList.remove("loading");
    btn.innerText = "Send Message";
  }, function(error) {
    errorMessage.style.display = "block";
    successMessage.style.display = "none";

    btn.classList.remove("loading");
    btn.innerText = "Send Message";

    console.log(error);
  });
});
</script>

</body>
</html>
