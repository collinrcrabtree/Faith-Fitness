<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule | Faith & Form</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{--ink:#1c1a17;--paper:#f2ede6;--stone:#a89b88;--moss:#6b7c5e;--birch:#d4c9b5;--warm-white:#faf8f4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--paper);}

/* ✅ HEADER (MATCHES HOMEPAGE) */
#nav-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:28px 56px;
  position:fixed;
  top:0;left:0;right:0;
  z-index:1000;
  transition:.4s;
}
#nav-header.scrolled{
  background:rgba(242,237,230,0.92);
  backdrop-filter:blur(10px);
  padding:18px 56px;
}

.nav-logo .wordmark{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.25em;
}

#nav-header ul{
  list-style:none;
  display:flex;
  gap:30px;
}

#nav-header a{
  text-decoration:none;
  font-size:11px;
  letter-spacing:.3em;
  color:var(--ink);
}

/* HERO OFFSET FIX */
.page-hero{
  margin-top:100px;
  height:58vh;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:0 56px 72px;
}

.page-hero img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.page-hero-content{
  position:relative;
  color:white;
}

/* SIMPLE CONTENT */
.schedule-section{
  padding:80px 56px;
}

footer{
  background:#111;
  color:#aaa;
  padding:40px;
  display:flex;
  justify-content:space-between;
}

/* ✅ NOT A NAV ANYMORE */
.footer-links{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.footer-links a{
  color:#aaa;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- ✅ ONLY REAL NAV -->
<nav id="nav-header">
  <div class="nav-logo">
    <span class="wordmark">Faith & Form</span>
  </div>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="classes.html">Classes</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="page-hero">
  <img src="image4.jpeg">
  <div class="page-hero-content">
    <h1>Class Schedule</h1>
  </div>
</section>

<div class="schedule-section">
  <h2>Book Your Session</h2>

  <div class="schedule-embed-wrapper">
    <div class="mindbody-widget" data-widget-type="Schedules" data-widget-id="78477613f70"></div>
    <script async src="https://brandedweb.mindbodyonline.com/embed/widget.js"></script>
  </div>
</div>

<footer>
  <div>© 2026 Faith & Form</div>

  <!-- ✅ FIXED -->
  <div class="footer-links">
    <a href="about.html">About</a>
    <a href="classes.html">Classes</a>
    <a href="schedule.html">Schedule</a>
    <a href="contact.html">Contact</a>
  </div>
</footer>

<script>
const nav = document.getElementById('nav-header');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 60);
});
</script>

</body>
</html>
